<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Publish Ride</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="publish.css">

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    #map {
      height: 400px;
      width: 100%;
      margin-bottom: 20px;
      border: 2px solid #007bff;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <div id="head">
    <h1>Saha<i>Vahan</i></h1>

    <div id="login">
      <h2>
        Welcome,
        <span id="usernameDisplay"></span>
        !!!
        Your Unique Code:
        <strong id="codeDisplay"></strong>
      </h2>
    </div>
  </div>
</header>

<h3>Publish a Ride</h3>

<div id="map"></div>

<p style="margin-left:10px;">
  Click once for Source and again for Destination.
</p>

<form id="publishForm">

  <input
    type="text"
    id="source"
    placeholder="Source Location"
    readonly
    required
  >

  <br><br>

  <input
    type="text"
    id="destination"
    placeholder="Destination Location"
    readonly
    required
  >

  <br><br>

  <input
    type="date"
    id="date"
    required
  >

  <br><br>

  <input
    type="time"
    id="time"
    required
  >

  <br><br>

  <input
    type="number"
    id="seats"
    placeholder="Available Seats"
    min="1"
    required
  >

  <br><br>

  <input
    type="number"
    id="price"
    placeholder="Price Per Seat"
    min="1"
    required
  >

  <br><br>

  <button type="submit">
    Publish Ride
  </button>

</form>

<br>

<button onclick="logout()">
  Logout
</button>

<footer>

  <main id="about">

    <b>About Us</b>

    <form action="contact.html">
      <button>
        Contact Us
      </button>
    </form>

    <form action="services.html">
      <button>
        Services
      </button>
    </form>

  </main>

  <h4>It was developed by ME</h4>

  <b>
    <i>©2025 SahaVahan.com</i>
  </b>

</footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const username =
  localStorage.getItem("username");

const uniqueCode =
  localStorage.getItem("uniqueCode");

if (!username || !uniqueCode) {

  alert(
    "Please login first."
  );

  window.location.href =
    "login.html";
}

document.getElementById(
  "usernameDisplay"
).textContent = username;

document.getElementById(
  "codeDisplay"
).textContent = uniqueCode;

const sourceInput =
  document.getElementById(
    "source"
  );

const destinationInput =
  document.getElementById(
    "destination"
  );

let clickCount = 0;

let sourceMarker;
let destinationMarker;

/* ===========================
   CREATE MAP
=========================== */

const map = L.map("map").setView(
  [20.5937, 78.9629],
  5
);

L.tileLayer(
  "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
  {
    maxZoom: 19,
    attribution:
      "&copy; OpenStreetMap contributors"
  }
).addTo(map);

setTimeout(() => {
  map.invalidateSize();
}, 1000);

/* ===========================
   GET LOCATION NAME
=========================== */

async function getLocationName(
  lat,
  lon
) {

  try {

    const response =
      await fetch(
        `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
      );

    const data =
      await response.json();

    return (
      data.address?.city ||
      data.address?.town ||
      data.address?.village ||
      data.display_name ||
      "Unknown Location"
    );

  } catch (err) {

    console.error(
      "Location Error:",
      err
    );

    return "Unknown Location";
  }
}

/* ===========================
   MAP CLICK
=========================== */

map.on(
  "click",
  async function (e) {

    const locationName =
      await getLocationName(
        e.latlng.lat,
        e.latlng.lng
      );

    if (clickCount === 0) {

      if (sourceMarker) {
        map.removeLayer(
          sourceMarker
        );
      }

      sourceInput.value =
        locationName;

      sourceMarker =
        L.marker(
          e.latlng
        )
        .addTo(map)
        .bindPopup(
          "Source: " +
          locationName
        )
        .openPopup();

      clickCount = 1;

    } else {

      if (destinationMarker) {
        map.removeLayer(
          destinationMarker
        );
      }

      destinationInput.value =
        locationName;

      destinationMarker =
        L.marker(
          e.latlng
        )
        .addTo(map)
        .bindPopup(
          "Destination: " +
          locationName
        )
        .openPopup();

      clickCount = 0;
    }
  }
);

/* ===========================
   PUBLISH RIDE
=========================== */

document
.getElementById(
  "publishForm"
)
.addEventListener(
  "submit",
  async function (e) {

    e.preventDefault();

    const source =
      sourceInput.value.trim();

    const destination =
      destinationInput.value.trim();

    if (
      !source ||
      !destination
    ) {

      alert(
        "Select source and destination on map."
      );

      return;
    }

    const date =
      document.getElementById(
        "date"
      ).value;

    const time =
      document.getElementById(
        "time"
      ).value;

    const seats =
      document.getElementById(
        "seats"
      ).value;

    const price =
      document.getElementById(
        "price"
      ).value;

    try {

      const response =
        await fetch(
          "/api/rides/publish",
          {
            method: "POST",
            headers: {
              "Content-Type":
                "application/json"
            },
            body: JSON.stringify({
              username,
              uniqueCode,
              source,
              destination,
              date,
              time,
              seats:
                Number(seats),
              price:
                Number(price)
            })
          }
        );

      const data =
        await response.json();

      if (response.ok) {

        alert(
          "Ride Published Successfully!"
        );

        window.location.href =
          "dashboard.html";

      } else {

        alert(
          data.message ||
          "Failed to publish ride."
        );
      }

    } catch (err) {

      console.error(
        "Publish Error:",
        err
      );

      alert(
        "Server error while publishing ride."
      );
    }
  }
);

/* ===========================
   LOGOUT
=========================== */

function logout() {

  localStorage.clear();

  window.location.href =
    "login.html";
}

</script>

</body>
</html>
```
